<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lagoa Branca Box</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f2ed; --sand: #e8e2d8; --stone: #c8b89e; --bark: #6b5e50;
    --earth: #3a3228; --deep: #2e2820; --muted: #524840; --green: #3d6b4f;
    --green-light: #edf3ee; --card-bg: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Jost',sans-serif; background:var(--cream); color:var(--earth); min-height:100vh; max-width:480px; margin:0 auto; }
  .header { background:var(--cream); padding:12px 20px 0; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(200,184,158,0.3); }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .brand-block { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .brand-text { font-family:'Cinzel',serif; font-size:15px; font-weight:400; color:var(--deep); letter-spacing:0.08em; white-space:nowrap; }
  .brand-text strong { font-weight:600; }
  .cart-btn { background:var(--deep); color:var(--cream); border:none; border-radius:50px; padding:9px 16px; font-family:'Jost',sans-serif; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:7px; }
  .cart-count { background:var(--stone); color:var(--deep); border-radius:50%; width:20px; height:20px; font-size:12px; font-weight:500; display:flex; align-items:center; justify-content:center; }
  .tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:14px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; background:transparent; border:1px solid rgba(200,184,158,0.5); border-radius:50px; padding:7px 14px; font-family:'Jost',sans-serif; font-size:12.5px; color:var(--muted); cursor:pointer; transition:all 0.2s; }
  .tab.active { background:var(--deep); border-color:var(--deep); color:var(--cream); }
  .content { padding:20px; display:flex; flex-direction:column; gap:12px; }
  .category-label { font-size:12px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--bark); margin-bottom:4px; margin-top:4px; }
  .item-card { background:var(--card-bg); border-radius:12px; padding:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 1px 8px rgba(0,0,0,0.05); }
  .item-info { flex:1; }
  .item-name { font-size:15px; font-weight:400; color:var(--deep); line-height:1.3; margin-bottom:4px; }
  .item-desc { font-size:13.5px; font-weight:300; color:var(--bark); line-height:1.6; }
  .item-price { font-size:16px; font-weight:500; color:var(--earth); margin-top:6px; }
  .qty-control { display:flex; align-items:center; gap:0; flex-shrink:0; }
  .qty-btn { width:32px; height:32px; border:1px solid var(--sand); background:var(--cream); border-radius:50%; font-size:18px; font-weight:300; color:var(--earth); cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
  .qty-btn.add { background:var(--deep); border-color:var(--deep); color:var(--cream); }
  .qty-num { width:32px; text-align:center; font-size:15px; font-weight:400; color:var(--deep); }
  .overlay { position:fixed; inset:0; background:rgba(46,40,32,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .overlay.open { opacity:1; pointer-events:all; }
  .cart-drawer { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; background:var(--cream); border-radius:20px 20px 0 0; z-index:300; transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); max-height:90vh; display:flex; flex-direction:column; }
  .cart-drawer.open { transform:translateX(-50%) translateY(0); }
  .drawer-handle { width:40px; height:4px; background:var(--stone); border-radius:2px; margin:14px auto 0; opacity:0.5; flex-shrink:0; }
  .drawer-header { padding:16px 20px 12px; border-bottom:1px solid rgba(200,184,158,0.3); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
  .drawer-title { font-family:'Cinzel',serif; font-size:16px; font-weight:400; color:var(--deep); letter-spacing:0.10em; }
  .drawer-close { font-size:14px; color:var(--bark); cursor:pointer; background:none; border:none; font-family:'Jost',sans-serif; }
  .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; }
  .cart-empty { text-align:center; padding:40px 0; color:var(--bark); font-size:14px; font-weight:300; line-height:1.7; }
  .cart-item { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(200,184,158,0.2); gap:12px; }
  .cart-item-name { font-size:15px; font-weight:400; color:var(--deep); flex:1; }
  .cart-item-qty { font-size:13px; font-weight:300; color:var(--bark); }
  .cart-item-price { font-size:15px; font-weight:500; color:var(--earth); min-width:60px; text-align:right; }
  .cart-total { padding:16px 20px 0; border-top:1px solid rgba(200,184,158,0.4); flex-shrink:0; }
  .total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .total-label { font-size:13px; font-weight:400; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
  .total-value { font-family:'Cinzel',serif; font-size:22px; font-weight:500; color:var(--deep); }
  .payment-section { padding:0 20px 32px; display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
  .pay-label { font-size:12px; font-weight:400; letter-spacing:0.16em; text-transform:uppercase; color:var(--bark); margin-bottom:2px; }
  .btn-pix { background:var(--green); color:#fff; border:none; border-radius:12px; padding:16px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .btn-pix-sub { font-size:12px; font-weight:300; opacity:0.85; margin-top:2px; }
  .btn-card { background:var(--card-bg); color:var(--deep); border:1px solid rgba(200,184,158,0.6); border-radius:12px; padding:16px; font-family:'Jost',sans-serif; font-size:14px; font-weight:400; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .btn-card-sub { font-size:12px; font-weight:300; color:var(--bark); margin-top:2px; }
  .btn-col { display:flex; flex-direction:column; gap:2px; text-align:center; }
  .confirm-screen { position:fixed; top:0; left:0; right:0; bottom:0; background:var(--cream); z-index:500; display:none; flex-direction:column; width:100%; }
  .confirm-screen.open { display:flex; }
  .confirm-header { width:100%; padding:20px 16px 12px; display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
  .confirm-icon { font-size:40px; margin-bottom:10px; }
  .confirm-title { font-family:'Cinzel',serif; font-size:19px; font-weight:500; color:var(--deep); letter-spacing:0.12em; text-align:center; margin-bottom:5px; }
  .confirm-sub { font-size:14px; font-weight:300; color:var(--bark); text-align:center; line-height:1.7; }
  .confirm-scroll { flex:1; overflow-y:auto; width:100%; padding:0 16px; -webkit-overflow-scrolling:touch; }
  .confirm-items { background:var(--card-bg); border-radius:12px; padding:16px; margin:14px 0 0; box-shadow:0 1px 8px rgba(0,0,0,0.05); }
  .confirm-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(200,184,158,0.2); font-size:15px; }
  .confirm-item:last-child { border-bottom:none; }
  .confirm-item-name { color:var(--earth); font-weight:400; }
  .confirm-item-price { color:var(--deep); font-weight:500; }
  .confirm-total { display:flex; justify-content:space-between; align-items:center; padding:14px 0 6px; border-top:1px solid rgba(200,184,158,0.4); margin-top:10px; }
  .confirm-total-label { font-size:13px; font-weight:400; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  .confirm-total-value { font-family:'Cinzel',serif; font-size:22px; font-weight:500; color:var(--deep); }
  .pix-box { background:#f0f7f2; border-radius:12px; padding:16px; margin-top:12px; margin-bottom:14px; width:100%; }
  .pix-box-label { font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--green); margin-bottom:8px; }
  .pix-key-row { display:flex; align-items:center; gap:10px; background:#fff; border-radius:8px; padding:12px 14px; margin-bottom:8px; width:100%; }
  .pix-key { font-family:'Jost',sans-serif; font-size:15px; font-weight:500; color:var(--deep); letter-spacing:0.05em; flex:1; min-width:0; word-break:break-all; }
  .pix-copy { background:var(--green); border:none; border-radius:8px; padding:7px 10px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; gap:4px; color:#fff; font-family:'Jost',sans-serif; font-size:12px; font-weight:500; white-space:nowrap; }
  .pix-amount { font-family:'Cinzel',serif; font-size:18px; font-weight:500; color:var(--green); text-align:center; margin-top:4px; }
  .pix-instruction { font-size:14px; font-weight:300; color:var(--muted); text-align:center; line-height:1.7; margin-top:8px; }
  .card-box { background:var(--sand); border-radius:12px; padding:16px; margin-top:12px; margin-bottom:14px; text-align:center; }
  .card-box-label { font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .card-link-btn { display:inline-block; background:var(--deep); color:var(--cream); border-radius:10px; padding:12px 28px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; text-decoration:none; letter-spacing:0.06em; }
  .card-instruction { font-size:13px; font-weight:300; color:var(--muted); margin-top:10px; line-height:1.7; }
  .confirm-footer { width:100%; padding:12px 16px 32px; border-top:1px solid rgba(200,184,158,0.3); background:var(--cream); flex-shrink:0; display:flex; flex-direction:column; gap:10px; }
  .btn-confirm { width:100%; background:var(--deep); color:var(--cream); border:none; border-radius:12px; padding:17px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; letter-spacing:0.08em; cursor:pointer; }
  .btn-back-shop { background:none; border:none; font-family:'Jost',sans-serif; font-size:14px; font-weight:300; color:var(--bark); cursor:pointer; padding:8px; text-align:center; }
  .success-screen { position:fixed; inset:0; background:var(--cream); z-index:600; display:none; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; max-width:480px; margin:0 auto; left:50%; transform:translateX(-50%); }
  .success-screen.open { display:flex; }
  .success-icon { font-size:60px; margin-bottom:18px; }
  .success-title { font-family:'Cinzel',serif; font-size:22px; font-weight:500; color:var(--deep); letter-spacing:0.12em; margin-bottom:12px; }
  .success-msg { font-size:15px; font-weight:300; color:var(--muted); line-height:1.8; margin-bottom:32px; }
  .success-msg strong { font-weight:500; color:var(--earth); display:block; margin-bottom:4px; }
  .btn-done { background:var(--deep); color:var(--cream); border:none; border-radius:12px; padding:16px 40px; font-family:'Jost',sans-serif; font-size:14px; font-weight:400; letter-spacing:0.08em; cursor:pointer; }
  .spacer { height:100px; }
  .cart-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--cream); border-top:1px solid rgba(200,184,158,0.3); padding:12px 20px 24px; z-index:100; display:none; }
  .cart-bar.visible { display:block; }
  .cart-bar-btn { width:100%; background:var(--deep); color:var(--cream); border:none; border-radius:12px; padding:15px 20px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  .cart-bar-total { font-family:'Cinzel',serif; font-size:16px; }
</style>
</head>

    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.562 4.141 1.54 5.874L0 24l6.304-1.508A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.032-1.388l-.36-.214-3.742.895.952-3.642-.234-.374A9.818 9.818 0 1112 21.818z"/></svg>
    Send items to WhatsApp · Enviar itens
  </button>
  <button class="btn-done" onclick="resetAll()">Fechar · Close</button>
</div>

<script>

const PIX_KEY = '47191855000100';
const CARD_LINK = 'https://link.mercadopago.com.br/lagoa-branca';
const WHATSAPP = '5548984571715';

const products = [
  {id:1,cat:'health',name:'Barra de Proteína',desc:'Chocolate 70% cacau · 45g',price:20},
  {id:2,cat:'health',name:'Mix de Nuts Premium',desc:'Castanha, amêndoa, macadâmia · 40g',price:18},
  {id:3,cat:'health',name:'Barra de Castanha Artesanal',desc:'Mel e castanha do Pará · local',price:16},
  {id:4,cat:'curadoria',name:'Mel Artesanal',desc:'Mel de abelha nativa · mini pote 50g',price:18},
  {id:5,cat:'curadoria',name:'Chocolate Artesanal',desc:'Cacau da Mata Atlântica · 80g',price:22},
  {id:6,cat:'curadoria',name:'Café Especial',desc:'Blend local · dose para 2 xícaras',price:20},
  {id:7,cat:'beleza',name:'Máscara Facial Coreana',desc:'Intensive hydration · Hidratação intensiva · 1 unidade',price:20},
  {id:8,cat:'beleza',name:'Sal Aromático Escalda-Pés',desc:'Lavender & sea salt · Lavanda e sal marinho · 80g',price:20},
  {id:9,cat:'beleza',name:'Vela Aromática · Scented Candle',desc:'Coco e baunilha · Coconut & vanilla · 60g',price:30},
  {id:10,cat:'bebidas',name:'Espumante Local',desc:'Brut rosé · 375ml · gelado',price:50},
  {id:11,cat:'bebidas',name:'Cerveja Artesanal',desc:'IPA da Ilha · 2 unidades · gelada',price:30},
  {id:12,cat:'bebidas',name:'Água com Gás Premium',desc:'Levemente gaseificada · 500ml',price:12},
  {id:13,cat:'galeria',name:'Obra com moldura · With frame',desc:'Elisa Cândido · peça única · retire da parede · unique piece · take from the wall',price:200},
  {id:14,cat:'galeria',name:'Obra sem moldura · Without frame',desc:'Elisa Cândido · peça única · ideal para viagem · unique piece · travel-friendly',price:150},
  {id:15,cat:'galeria',name:'Artplanner — Elisa Cândido',desc:'Planner artístico · aquarela · edição limitada · Artistic planner · watercolor · limited edition',price:250},
];

const catLabels = {health:'🌱 Health',curadoria:'🌴 Curadoria Local',beleza:'🛁 Loft Spa',bebidas:'🍷 Drinks · Bebidas',galeria:'🎨 Gallery · Galeria'};
let cart = {};
let currentCat = 'all';
let paymentMethod = '';

function fmt(n) { return 'R$' + n.toFixed(0); }
function getTotal() { return Object.entries(cart).reduce((s,[id,q]) => { const p=products.find(x=>x.id==id); return s+(p?p.price*q:0); }, 0); }
function getTotalItems() { return Object.values(cart).reduce((s,q) => s+q, 0); }

function updateCartUI() {
  const total=getTotal(), items=getTotalItems();
  document.getElementById('cartCount').textContent = items;
  document.getElementById('cartBarItems').textContent = items + (items===1?' item':' items');
  document.getElementById('cartBarTotal').textContent = fmt(total);
  document.getElementById('cartBar').classList.toggle('visible', items>0);
  renderDrawer();
}

function addItem(id) { cart[id]=(cart[id]||0)+1; renderContent(); updateCartUI(); }
function removeItem(id) {
  if(!cart[id]) return;
  cart[id]--;
  if(cart[id]===0) delete cart[id];
  renderContent(); updateCartUI();
}

function renderContent() {
  const filtered = currentCat==='all' ? products : products.filter(p=>p.cat===currentCat);
  const byCat = {};
  filtered.forEach(p => { if(!byCat[p.cat]) byCat[p.cat]=[]; byCat[p.cat].push(p); });
  let html = '';
  Object.entries(byCat).forEach(([cat, items]) => {
    if(currentCat==='all') html += '<div class="category-label">'+catLabels[cat]+'</div>';
    if(cat==='galeria' && currentCat==='galeria') html += '<div style="background:#f5f2ed;border:1px solid rgba(200,184,158,0.4);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-family:Jost,sans-serif;font-size:12.5px;font-weight:300;color:#6b5f52;line-height:1.8;">🎨 <strong style="font-weight:500;color:#3a3228;">Gallery · Galeria — Elisa Cândido</strong><br><br>The artworks are on the loft walls. Choose the one that moves you and take it — a new piece will take its place. Available with or without frame.<br><br>As obras estão nas paredes do loft. Escolha a que te tocou e leve — uma nova peça ocupará seu lugar. Disponível com ou sem moldura.<br><br>📦 <em>Travelling light? Choose without frame — easy to pack. · Viajando de avião? Escolha sem moldura — fácil de transportar.</em></div>';
    items.forEach(p => {
      const qty = cart[p.id]||0;
      html += '<div class="item-card"><div class="item-info"><div class="item-name">'+p.name+'</div><div class="item-desc">'+p.desc+'</div><div class="item-price">'+fmt(p.price)+'</div></div><div class="qty-control">';
      if(qty>0) html += '<button class="qty-btn" onclick="removeItem('+p.id+')">−</button><span class="qty-num">'+qty+'</span>';
      html += '<button class="qty-btn add" onclick="addItem('+p.id+')">+</button></div></div>';
    });
  });
  document.getElementById('content').innerHTML = html;
}

function renderDrawer() {
  const items = Object.entries(cart).filter(([,q])=>q>0);
  const body = document.getElementById('drawerBody');
  const totalSection = document.getElementById('cartTotalSection');
  const paySection = document.getElementById('paymentSection');
  if(items.length===0) {
    body.innerHTML = '<div class="cart-empty">Your cart is empty.<br>Seu carrinho está vazio.</div>';
    totalSection.style.display='none'; paySection.style.display='none'; return;
  }
  let html = '';
  items.forEach(([id,qty]) => {
    const p = products.find(x=>x.id==id);
    if(!p) return;
    html += '<div class="cart-item"><div class="cart-item-name">'+p.name+'</div><div class="cart-item-qty">× '+qty+'</div><div class="cart-item-price">'+fmt(p.price*qty)+'</div></div>';
  });
  body.innerHTML = html;
  document.getElementById('cartTotalValue').textContent = fmt(getTotal());
  totalSection.style.display='block'; paySection.style.display='block';
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function filterCategory(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function copyPix() {
  if(navigator.clipboard) {
    navigator.clipboard.writeText(PIX_KEY).then(() => {
      const btn = document.querySelector('.pix-copy');
      if(btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.innerHTML = '📋 Copy · Copiar'; }, 2000); }
    });
  }
}

function initiatePayment(method) {
  paymentMethod = method;
  const items = Object.entries(cart).filter(([,q])=>q>0);
  const total = getTotal();
  let html = '';
  items.forEach(([id,qty]) => {
    const p = products.find(x=>x.id==id);
    if(!p) return;
    html += '<div class="confirm-item"><span class="confirm-item-name">'+p.name+' × '+qty+'</span><span class="confirm-item-price">'+fmt(p.price*qty)+'</span></div>';
  });
  document.getElementById('confirmItems').innerHTML = html;
  document.getElementById('confirmTotalValue').textContent = fmt(total);

  if(method==='pix') {
    document.getElementById('confirmSub').textContent = 'Make the Pix payment below and confirm · Faça o Pix abaixo e confirme';
    document.getElementById('pixBox').innerHTML =
      '<div class="pix-box">' +
        '<div class="pix-box-label">Pay via Pix · Dados para pagamento</div>' +
        '<div class="pix-key-row"><span class="pix-key" style="font-size:13px;letter-spacing:0.08em;word-break:keep-all;">'+PIX_KEY+'</span><button class="pix-copy" onclick="copyPix()" style="flex-shrink:0;">📋 Copiar</button></div>' +
        '<div class="pix-amount">'+fmt(total)+'</div>' +
        '<div class="pix-instruction">Open your bank app · copy the key · enter the amount and pay<br>Abra o app do banco · copie a chave · informe o valor e pague</div>' +
      '</div>';
    document.getElementById('btnConfirm').textContent = 'I paid via Pix · Paguei ✓';
  } else {
    document.getElementById('confirmSub').textContent = 'Envie seu pedido pelo WhatsApp · Send your order via WhatsApp';
    document.getElementById('pixBox').innerHTML =
      '<div class="card-box">' +
        '<div class="card-box-label">Wise · International Transfer</div>' +
        '<div class="pix-amount" style="color:var(--deep);margin:10px 0;">'+fmt(total)+'</div>' +
        '<div class="card-instruction" style="font-size:13px;line-height:1.7;">Click below to send us your order via WhatsApp. We will reply with your Wise payment link right away.<br><br>Clique abaixo para enviar seu pedido. Responderemos com o link em instantes.</div>' +
      '</div>';
    document.getElementById('btnConfirm').textContent = 'Send via WhatsApp · Enviar pelo WhatsApp';
  }

  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('confirmScreen').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmScreen').classList.remove('open');
  toggleCart();
}

function confirmAndPay() {
  const items = Object.entries(cart).filter(([,q])=>q>0);
  const total = getTotal();

  let msg = '';
  if(paymentMethod === 'card') {
    msg = '🌿 *Lagoa Branca Box · Honest Market*\n📋 *Order · Pedido*\n\n';
    items.forEach(([id,qty]) => {
      const p = products.find(x=>x.id==id);
      if(p) msg += '• '+p.name+' × '+qty+' — '+fmt(p.price*qty)+'\n';
    });
    msg += '\n💰 *Total: '+fmt(total)+'*\n\n💳 I would like to pay via Wise. Could you send me the payment link? · Gostaria de pagar via Wise. Pode enviar o link?';
    window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg), '_blank');
    cart = {};
    renderContent(); updateCartUI();
    document.getElementById('confirmScreen').classList.remove('open');
    // Wise success screen - no WhatsApp button needed
    document.getElementById('successWaBtn').style.display = 'none';
    document.getElementById('successMsg').innerHTML = '<strong>Thank you!</strong> We received your order and will send your Wise payment link shortly via WhatsApp. ✨<br><br>Recebemos seu pedido e enviaremos o link de pagamento em breve pelo WhatsApp.';
    document.getElementById('successScreen').classList.add('open');
    window._waMsg = null;
  } else {
    msg = '🌿 *Lagoa Branca Box · Honest Market*\n📋 *Itens adquiridos*\n\n';
    items.forEach(([id,qty]) => {
      const p = products.find(x=>x.id==id);
      if(p) msg += '• '+p.name+' × '+qty+' — '+fmt(p.price*qty)+'\n';
    });
    msg += '\n💰 *Total: '+fmt(total)+'*\n💳 *Pago via: Pix*';
    window._waMsg = msg;
    document.getElementById('confirmScreen').classList.remove('open');
    // Pix success screen - show WhatsApp button
    document.getElementById('successWaBtn').style.display = 'flex';
    document.getElementById('successMsg').innerHTML = '<strong>Thank you!</strong> Aproveite cada momento. ✨<br><br>Enjoy every moment.';
    document.getElementById('successScreen').classList.add('open');
  }
}

function sendWhatsApp() {
  if(!window._waMsg) return;
  window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(window._waMsg), '_blank');
}

function resetAll() {
  cart = {};
  document.getElementById('successScreen').classList.remove('open');
  renderContent(); updateCartUI();
}

renderContent();
updateCartUI();

</script>
</body>
</html>
